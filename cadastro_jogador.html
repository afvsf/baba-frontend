<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baba dos Amigos - Jogadores</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:#fff;
  margin:0;
}

header{
  background:#020617;
  padding:15px;
  text-align:center;
  font-size:22px;
}

.container{
  display:grid;
  grid-template-columns: 1fr 2fr;
  gap:20px;
  padding:20px;
}

.card{
  background:#1e293b;
  padding:20px;
  border-radius:10px;
}

input,select{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:6px;
  border:none;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.btn{ background:#22c55e; color:#000; }
.btn-del{ background:#ef4444; color:#fff; }
.btn-edit{ background:#3b82f6; color:#fff; }

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid #334155;
  text-align:left;
}

.devendo{ color:#ef4444; }
.ok{ color:#22c55e; }

.barra-topo{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background:#020617;
  padding:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.5);
  z-index:999;
  display:flex;
  align-items:center;
}

.btn-voltar{
  background:#334155;
  color:#fff;
  border:none;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  transition:0.3s;
}

.btn-voltar:hover{
  background:#475569;
}

/* 📱 MOBILE */
@media(max-width:600px){

  body{
    font-size:13px;
  }

  header{
    font-size:18px;
    padding:12px;
  }

  .container{
    grid-template-columns: 1fr; /* 🔥 1 coluna */
    padding:10px;
    gap:10px;
  }

  .card{
    padding:12px;
  }

  input, select{
    padding:8px;
    font-size:13px;
  }

  button{
    padding:10px;
    font-size:14px;
  }

  /* 🔥 TABELA VIRA CARD */
  table, thead, tbody, th, td, tr{
    display:block;
    width:100%;
  }

  thead{
    display:none;
  }

  tr{
    background:#0f172a;
    margin-bottom:10px;
    padding:10px;
    border-radius:10px;
  }

  td{
    border:none;
    padding:6px 5px;
    position:relative;
    padding-left:50%;
  }

  td::before{
    position:absolute;
    left:10px;
    font-weight:bold;
    color:#94a3b8;
  }

  td:nth-child(1)::before{ content:"Nome"; }
  td:nth-child(2)::before{ content:"Apelido"; }
  td:nth-child(3)::before{ content:"Posição"; }
  td:nth-child(4)::before{ content:"Tipo"; }
  td:nth-child(5)::before{ content:"Telefone"; }

  /* 🔥 BOTÕES MAIS BONITOS */
  .btn, .btn-edit, .btn-del{
    width:100%;
    margin-top:5px;
    font-size:13px;
  }

  /* 🔥 BARRA TOPO AJUSTE */
  .barra-topo{
    padding:8px;
  }

  .btn-voltar{
    font-size:12px;
    padding:6px 10px;
  }

}

.card{
  box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

  
</style>

</head>
<body>
<div class="barra-topo">
  <button onclick="window.location.href='index.html'" class="btn-voltar">
    ⬅ Voltar
  </button>
  <button onclick="logout()" style="background:#ef4444;">
🚪 Sair
</button>
</div>


<header>⚽ Baba PRO - Gestão de Jogadores</header>

<div class="container">

<!-- CADASTRO -->
<div class="card">
<h2>👤 Cadastro</h2>

<input id="nome" placeholder="Nome">
<input id="apelido" placeholder="Apelido">
<input id="posicao" placeholder="Posição">
<input id="telefone" placeholder="Telefone">

<label>Data Cadastro</label>
<input type="date" id="dataCadastro">

<label>Tipo</label>
<select id="tipoJogador">
  <option value="avulso">Avulso</option>
  <option value="mensal">Mensalista</option>
</select>

<button id="btnSalvar" class="btn" onclick="salvarJogador()">Salvar</button>

</div>

<!-- LISTA -->
<div class="card">
<h2>📋 Jogadores</h2>

<table>
<thead>
<tr>
<th>Nome</th>
<th>Posição</th>
<th>Tipo</th>
<th>Status</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="tabelaJogadores"></tbody>
</table>

</div>

</div>

<!-- 🔐 AUTH -->
<script src="auth.js"></script>
<script>
verificarAcesso();
</script>
  
<script>

const API = 'https://baba-backend-production.up.railway.app';

let jogadores = [];
let mensalidades = {};
let editandoId = null;

// ===== CARREGAR =====
async function carregar(){
  const j = await fetch(API+'/jogadores').then(r=>r.json());
  const m = await fetch(API+'/mensalidades?ts=' + Date.now())
  .then(r=>r.json());

  jogadores = j;

  mensalidades = {};

m.forEach(x=>{
  if(!mensalidades[x.mes]){
    mensalidades[x.mes] = [];
  }
  mensalidades[x.mes].push(x);
});

  render();
}

// ===== SALVAR =====
async function salvarJogador(){

  const jogador = {
    id: editandoId || 'j'+Date.now(),
    nome: val('nome'),
    apelido: val('apelido'),
    posicao: val('posicao'),
    telefone: val('telefone'),
    tipo: val('tipoJogador'),
    dataCadastro: val('dataCadastro') || new Date().toISOString().slice(0,10)
  };

  if(!jogador.nome) return alert("Nome obrigatório");

  if(editandoId){
    // 🔥 UPDATE
    await fetch(API+'/jogadores/'+editandoId,{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(jogador)
    });
  } else {
    // 🔥 INSERT
    await fetch(API+'/jogadores',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(jogador)
    });
  }

  limpar();
  editandoId = null;
  carregar();
  atualizarBotao();
}

// ===== EDITAR =====
function editar(id){
  const j = jogadores.find(x=>x.id===id);

  valSet('nome', j.nome);
  valSet('apelido', j.apelido);
  valSet('posicao', j.posicao);
  valSet('telefone', j.telefone);
  valSet('tipoJogador', j.tipo);
  valSet('dataCadastro', j.dataCadastro ? j.dataCadastro.split('T')[0] : '');

  editandoId = id;
  atualizarBotao();
}

// ===== EXCLUIR =====
async function excluir(id){
  if(!confirm("Excluir jogador?")) return;

  await fetch(API+'/jogadores/'+id,{
    method:'DELETE'
  });

  carregar();
}

// ===== STATUS =====
function contarDevendo(jogador){

  if(jogador.tipo !== 'mensal') return 0;

  const dataCadStr = jogador.dataCadastro || jogador.datacadastro;
  if(!dataCadStr) return 0;

  const hoje = new Date();

  const [anoCad, mesCad] = dataCadStr.split('T')[0].split('-').map(Number);

  let inicio = new Date(anoCad, mesCad - 1, 1);
  let fim = new Date(hoje.getFullYear(), hoje.getMonth(), 1);

  let total = 0;

  while(inicio <= fim){

    const mes = inicio.toISOString().slice(0,7);

    const pagos = mensalidades[mes] || [];

    const pagamento = pagos.find(p =>
      String(p.jogadorId || p.jogadorid) === String(jogador.id)
    );

    // 🔥 REGRA CORRETA
    const mesAtual =
      inicio.getFullYear() === hoje.getFullYear() &&
      inicio.getMonth() === hoje.getMonth();

    const podeCobrar =
      (mesAtual && hoje.getDate() > 10) ||
      (!mesAtual && inicio < new Date(hoje.getFullYear(), hoje.getMonth(), 1));

    if(!pagamento && podeCobrar){
      total++;
    }

    inicio.setMonth(inicio.getMonth() + 1);
  }

  return total;
}

// ===== RENDER =====
function render(){
  const tb = document.getElementById('tabelaJogadores');
  tb.innerHTML = '';

  jogadores.forEach(j=>{

   const dev = contarDevendo(j);

let valorTotal = dev * 20;

let valorFormatado = valorTotal.toLocaleString('pt-BR', {
  style: 'currency',
  currency: 'BRL'
});

let status = j.tipo==='mensal'
  ? (dev>0 
      ? `❌ ${dev} ${dev > 1 ? 'meses' : 'mês'}<br><small>${valorFormatado}</small>`
      : '✅ Em dia')
  : '🎟️ Avulso';

    let tr = document.createElement('tr');

    tr.innerHTML = `
      <td>${j.nome}</td>
      <td>${j.posicao||'-'}</td>
      <td>${j.tipo}</td>
      <td class="${dev>0?'devendo':'ok'}">${status}</td>
      <td>
        <button class="btn-edit" onclick="editar('${j.id}')">Editar</button>
        <button class="btn-del" onclick="excluir('${j.id}')">Excluir</button>
      </td>
    `;

    tb.appendChild(tr);
  });
}
//Botão Salvar/Atualizar Jogador
function atualizarBotao(){
  const btn = document.getElementById('btnSalvar');
  btn.textContent = editandoId ? 'Atualizar' : 'Salvar';
}

// ===== UTILS =====
function val(id){ return document.getElementById(id).value }
function valSet(id,v){ document.getElementById(id).value = v }

function limpar(){
  ['nome','apelido','posicao','telefone','dataCadastro'].forEach(id=>{
    valSet(id,'');
  });
}

// ===== INIT =====
carregar();
atualizarBotao();

</script>

</body>
</html>
