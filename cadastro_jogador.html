<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baba PRO Cadastro Completo</title>
<link rel="stylesheet" href="css/stylejogador.css">
</head>
<body>
<header><h1>⚽ Baba PRO Cadastro Completo</h1></header>

<div class="container">

<div class="card">
<h2>👤 Cadastro Completo de Jogador</h2>
<input id="nome" placeholder="Nome">
<input id="apelido" placeholder="Apelido">
<input id="posicao" placeholder="Posição (ex: atacante)">
<input id="telefone" placeholder="Telefone">
<label><input type="checkbox" id="mensalista"> Mensalista</label>
<button class="btn" onclick="cadastrarJogador()">Cadastrar</button>
<ul id="listaJogadores"></ul>
</div>

<div class="card">
<h2>📊 Perfil do Jogador</h2>
<select id="perfilSelect" onchange="verPerfil()"></select>
<div id="perfil"></div>
</div>

</div>

<script>

let banco = JSON.parse(localStorage.getItem('baba_db')||'{"jogadores":[],"babas":{}}');

function salvar(){
localStorage.setItem('baba_db',JSON.stringify(banco));
render();
}

function cadastrarJogador(){
const jogador={
nome:val('nome'),
apelido:val('apelido'),
posicao:val('posicao'),
telefone:val('telefone'),
mensalista:document.getElementById('mensalista').checked
};

if(!jogador.nome)return;

banco.jogadores.push(jogador);
salvar();
limpar();
}

function render(){

// lista
listaJogadores.innerHTML='';
banco.jogadores.forEach(j=>{
let li=document.createElement('li');
li.textContent=`${j.nome} (${j.apelido||''}) - ${j.posicao||''} ${j.mensalista?'💰':'❌'}`;
listaJogadores.appendChild(li);
});

// select perfil
perfilSelect.innerHTML='';
banco.jogadores.forEach(j=>{
let opt=document.createElement('option');
opt.value=j.nome;
opt.textContent=j.nome;
perfilSelect.appendChild(opt);
});
}

function verPerfil(){
const nome=val('perfilSelect');
const j=banco.jogadores.find(x=>x.nome===nome);

if(!j)return;

perfil.innerHTML=`
<h3>${j.nome}</h3>
<p>Apelido: ${j.apelido}</p>
<p>Posição: ${j.posicao}</p>
<p>Telefone: ${j.telefone}</p>
<p>Tipo: ${j.mensalista?'Mensalista':'Avulso'}</p>
`;
}

function val(id){return document.getElementById(id).value}
function limpar(){['nome','apelido','posicao','telefone'].forEach(id=>document.getElementById(id).value='')}

render();


</script>

<script src="js/app.js"></script>

</body>
</html>
