<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>⚽ Baba do Dia</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:#fff;
  margin:0;
}

header{
  background:#020617;
  padding:15px;
  text-align:center;
}

.container{
  padding:15px;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

input,select,button{
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:8px;
  border:none;
}

button{
  background:#22c55e;
  font-weight:bold;
}

table{
  width:100%;
  margin-top:10px;
  border-collapse:collapse;
}

th,td{
  padding:8px;
  border-bottom:1px solid #334155;
  text-align:center;
}

#rankingDia li{
  padding:8px;
  border-bottom:1px solid #334155;
}

#rankingDia li:first-child{
  background:#14532d;
  border-radius:6px;
}

.menu{
  text-align:center;
  margin:10px;
}

.btn{
  display:inline-block;
  background:#3b82f6;
  padding:8px 12px;
  margin:5px;
  border-radius:8px;
  text-decoration:none;
  color:#fff;
}
</style>
</head>

<body>

<header>
  <h2>⚽ Baba do Dia</h2>
</header>

<div class="menu">
  <a href="index.html" class="btn">🏠 Início</a>
  <a href="cadastro_jogador.html" class="btn">👤 Cadastro</a>
  <a href="mes.html" class="btn">💰 Mensalidades</a>
</div>

<div class="container">

<!-- DATA -->
<div class="card">
<h3>📅 Data</h3>
<input type="date" id="data">
</div>

<!-- REGISTRO -->
<div class="card">
<h3>➕ Registrar</h3>

<select id="jogador"></select>
<input type="number" id="gols" placeholder="Gols">
<input type="number" id="cartoes" placeholder="Cartões">
<input id="obs" placeholder="Observação">

<button onclick="registrar()">Registrar</button>
</div>

<!-- RESUMO -->
<div class="card">
<h3>📊 Resumo</h3>
<p id="resumoBaba"></p>
</div>

<!-- PARTICIPAÇÕES -->
<div class="card">
<h3>📋 Participações</h3>

<table>
<thead>
<tr>
<th>Jogador</th>
<th>Gols</th>
<th>Cartões</th>
<th>Obs</th>
<th>Ações</th>
</tr>
</thead>
<tbody id="listaRegistros"></tbody>
</table>
</div>

<!-- RANKING -->
<div class="card">
<h3>🏆 Top 3 do Baba</h3>
<ul id="rankingDia"></ul>
</div>

</div>

<script>
const API = 'https://baba-backend.onrender.com';

let jogadores = [];
let registros = [];

// ===== CARREGAR =====
async function carregar(){
  jogadores = await fetch(API+'/jogadores').then(r=>r.json());
  registros = await fetch(API+'/registros').then(r=>r.json());

  renderSelect();
  renderTudo();
}

// ===== SELECT =====
function renderSelect(){
  const sel = document.getElementById('jogador');
  sel.innerHTML = '';

  jogadores.forEach(j=>{
    let opt = document.createElement('option');
    opt.value = j.id;
    opt.textContent = j.nome;
    sel.appendChild(opt);
  });
}

// ===== REGISTRAR =====
async function registrar(){

  const data = document.getElementById('data').value;
  const jogadorId = document.getElementById('jogador').value;

  if(!data) return alert("Selecione data");

  // 🔥 SE ESTÁ EDITANDO
  if(registroEditando){

    await fetch(API + '/registro/' + registroEditando, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        data,
        jogadorId,
        gols: +document.getElementById('gols').value || 0,
        cartoes: +document.getElementById('cartoes').value || 0,
        obs: document.getElementById('obs').value
      })
    });

    registroEditando = null;
    
    carregar();
    return;
  }

  // 🚫 evitar duplicado
  const jaExiste = registros.some(r =>
    r.data === data && String(r.jogadorId) === String(jogadorId)
  );

  if(jaExiste){
    alert("⚠️ Jogador já registrado nesse baba!");
    return;
  }

  // 🔥 NOVO REGISTRO
  await fetch(API+'/registro',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      data,
      jogadorId,
      gols: +document.getElementById('gols').value || 0,
      cartoes: +document.getElementById('cartoes').value || 0,
      obs: document.getElementById('obs').value
    })
  });

  
  carregar();
}

// ===== REMOVER PARTICIPAÇÃO =====
async function removerRegistro(id){

  if(!confirm("Remover participação?")) return;

  await fetch(API + '/registro/' + id, {
    method: 'DELETE'
  });

  carregar();
}

// ===== LIMPAR CAMPOS =====
function limparCampos(){
  document.getElementById('gols').value = '';
  document.getElementById('cartoes').value = '';
  document.getElementById('obs').value = '';
}


// ===== EDITAR PARTICIPAÇÃO =====
let registroEditando = null;

function editarRegistro(id){

  const r = registros.find(r => r.id == id);

  if(!r) return;

  registroEditando = id;

  document.getElementById('gols').value = r.gols;
  document.getElementById('cartoes').value = r.cartoes;
  document.getElementById('obs').value = r.obs || '';

  document.getElementById('jogador').value = r.jogadorId;

  alert("✏️ Editando participação...");
}

  
// ===== RENDER GERAL =====
function renderTudo(){
  const data = document.getElementById('data').value;
  renderRegistros(data);
  renderResumo(data);
  renderTop3(data);
}

// ===== REGISTROS =====
function renderRegistros(data){

  const tb = document.getElementById('listaRegistros');

  if(!data){
    tb.innerHTML = '<tr><td colspan="5">Selecione uma data</td></tr>';
    return;
  }

  const lista = registros.filter(r =>
  r.data && r.data.startsWith(data)
);

  tb.innerHTML = '';

  if(lista.length === 0){
    tb.innerHTML = '<tr><td colspan="5">Nenhum jogador registrado</td></tr>';
    return;
  }

  lista.forEach(r=>{

    const jogador = jogadores.find(j => 
      String(j.id) === String(r.jogadorId || r.jogadorid)
    );

    let tr = document.createElement('tr');

    tr.innerHTML = `
      <td>${jogador ? jogador.nome : '⚠️ Não encontrado'}</td>
      <td>${r.gols}</td>
      <td>${r.cartoes}</td>
      <td>${r.obs || ''}</td>
      <td>
        <button onclick="editarRegistro('${r.id}')">✏️</button>
        <button onclick="removerRegistro('${r.id}')">🗑️</button>
      </td>
    `;

    tb.appendChild(tr);
  });
}

// ===== RESUMO =====
function renderResumo(data){

  const lista = registros.filter(r =>
  r.data && r.data.startsWith(data)
);

  const totalJogadores = lista.length;
  const totalGols = lista.reduce((s,r)=>s+r.gols,0);

  document.getElementById('resumoBaba').innerHTML =
    `👥 ${totalJogadores} jogadores | ⚽ ${totalGols} gols`;
}

// ===== RANKING =====
function renderTop3(data){

  const lista = registros.filter(r =>
  r.data && r.data.startsWith(data)
);

  const ranking = {};

  lista.forEach(r=>{
    const jogador = jogadores.find(j => 
      String(j.id) === String(r.jogadorId || r.jogadorid)
    );

    const nome = jogador ? jogador.nome : 'Desconhecido';

    if(!ranking[nome]){
      ranking[nome] = { gols:0, cartoes:0 };
    }

    ranking[nome].gols += r.gols;
    ranking[nome].cartoes += r.cartoes;
  });

  const ordenado = Object.entries(ranking).sort((a,b)=>{
    if(b[1].gols !== a[1].gols) return b[1].gols - a[1].gols;
    return a[1].cartoes - b[1].cartoes;
  });

  const ul = document.getElementById('rankingDia');
  ul.innerHTML = '';

  if(ordenado.length === 0){
    ul.innerHTML = '<li>Sem dados</li>';
    return;
  }

  const top3 = ordenado.slice(0,3);

  top3.forEach(([nome, stats], i)=>{

    let medalha = '';
    if(i === 0) medalha = '🥇';
    if(i === 1) medalha = '🥈';
    if(i === 2) medalha = '🥉';

    let li = document.createElement('li');

    li.innerHTML = `
      ${medalha} <b>${nome}</b><br>
      ⚽ ${stats.gols} | 🟨 ${stats.cartoes}
    `;

    ul.appendChild(li);
  });
}


// atualizar ao mudar data
document.getElementById('data').addEventListener('change', renderTudo);

// INIT
carregar();
</script>

</body>
</html>
