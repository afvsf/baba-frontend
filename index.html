<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>⚽ Baba dos Amigos</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:#fff;
  margin:0;
}

header{
  background:#020617;
  padding:15px;
  text-align:center;
}

.menu{
  text-align:center;
  margin:10px;
}

.btn{
  display:inline-block;
  background:#3b82f6;
  padding:8px 12px;
  margin:5px;
  border-radius:8px;
  text-decoration:none;
  color:#fff;
  font-weight:bold;
}

.container{
  padding:15px;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:8px;
  border-bottom:1px solid #334155;
  text-align:center;
}

.ok{ color:#22c55e; }
.devendo{ color:#ef4444; }
.avulso{ color:#38bdf8; }

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

/* desktop */
#listaMobile{
  display:none !important;
}

/* 📱 MOBILE */
@media(max-width:600px){

  table {
    display: none;
  }

  #listaMobile {
    display: block !important;
  }

  .card-jogador{
    background:#1e293b;
    margin-bottom:10px;
    padding:12px;
    border-radius:10px;
  }

  .card-jogador h4{
    margin:0;
    font-size:15px;
  }

  .card-info{
    font-size:12px;
    color:#94a3b8;
    margin-top:4px;
  }

  .card-status{
    margin-top:8px;
    font-weight:bold;
    font-size:13px;
  }

  #listaIndex{
  margin-top:10px;
}

.card-registro{
  background:#1e293b;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

.card-registro h4{
  margin:0;
  font-size:14px;
}

.info{
  font-size:12px;
  color:#94a3b8;
  margin-top:4px;
}

}

</style>
</head>

<body>

<header>
  <h2>⚽ Baba dos Amigos</h2>
</header>

<div class="menu">
  <a href="cadastro_jogador.html" class="btn">👤 Cadastro</a>
  <a href="mes.html" class="btn">💰 Mensalidades</a>
  <a href="baba.html" class="btn">📅 Baba do Dia</a>
  <button onclick="pedirSenha()" class="btn">
🔒 Área Administrativa
</button>
</div>

<div class="container">

<!-- JOGADORES -->
<div class="card">
<h3>👥 Jogadores</h3>

<table>
<thead>
<tr>
<th>Jogador</th>
<th>Apelido</th>
<th>Posição</th>
<th>Tipo</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tabelaJogadores"></tbody>
</table>

<div id="listaMobile"></div>
</div>

<!-- RANKINGS -->
<div class="grid">

<div class="card">
<h3>⚽ Artilharia</h3>
<ul id="rankingGols"></ul>
</div>

<div class="card">
<h3>👥 Participação</h3>
<ul id="rankingPresenca"></ul>
</div>

<div class="card">
<h3>🟨 Cartão Amarelo</h3>
<ul id="rankingAmarelo"></ul>
</div>

<div class="card">
<h3>🟦 Cartão Azul</h3>
<ul id="rankingAzul"></ul>
</div>

<div class="card">
<h3>🟥 Cartão Vermelho</h3>
<ul id="rankingVermelho"></ul>
</div>
  
</div>
<div class="card">
  <h3>📋 Participações por Data</h3>

  <input type="date" id="dataIndex">

  <div id="listaIndex"></div>
</div>
</div>

<script>
const API = 'https://baba-backend-production.up.railway.app';

let jogadores = [];
let registros = [];
let mensalidades = {};

// ===== CARREGAR =====
async function carregar(){

  jogadores = await fetch(API+'/jogadores').then(r=>r.json());
  registros = await fetch(API+'/registros').then(r=>r.json());
  const mensal = await fetch(API+'/mensalidades').then(r=>r.json());

  mensalidades = {};

  mensal.forEach(m=>{
    if(!mensalidades[m.mes]) mensalidades[m.mes]=[];
    mensalidades[m.mes].push(m);
  });

  renderJogadores();
  renderRanking();
}


// ===== FORMATA DATA =====
function formatarData(data){
  if(!data) return '-';
  return new Date(data).toLocaleDateString('pt-BR', { timeZone: 'UTC' });
}

// ===== STATUS =====
function contarDevendo(j){

  if(j.tipo !== 'mensal') return 0;

  const hoje = new Date();
  const limite = 10;

  const dataCadStr = j.dataCadastro || j.datacadastro;

  if(!dataCadStr) return 0;

  // 🔥 CORREÇÃO: evitar bug de timezone
  const [ano, mes] = dataCadStr.split('T')[0].split('-').map(Number);

  let inicio = new Date(ano, mes - 1, 1);
  let fim = new Date(hoje.getFullYear(), hoje.getMonth(), 1);

  // 🔥 REGRA DIA 10 (igual mes.html)
  if(hoje.getDate() <= limite){
    fim.setMonth(fim.getMonth() - 1);
  }

  let total = 0;

  while(inicio <= fim){

    const mesRef = inicio.toISOString().slice(0,7);

    const pagos = mensalidades[mesRef] || [];

    const pagou = pagos.some(p =>
      String(p.jogadorId || p.jogadorid) === String(j.id)
    );

    if(!pagou) total++;

    inicio.setMonth(inicio.getMonth() + 1);
  }

  return total;
}

// ===== JOGADORES =====
function renderJogadores(){

  const tb = document.getElementById('tabelaJogadores');
  const mobile = document.getElementById('listaMobile');

  tb.innerHTML = '';
  mobile.innerHTML = '';

  jogadores.forEach(j=>{

    const dev = contarDevendo(j);

    let status = '';
    let classe = '';

    if(j.tipo === 'mensal'){
      if(dev > 0){
        status = `❌ ${dev} mês(es)`;
        classe = 'devendo';
      }else{
        status = '✅ Em dia';
        classe = 'ok';
      }
    }else{
      status = '🎟️ Avulso';
      classe = 'avulso';
    }

    // ===== TABELA (desktop)
    let tr = document.createElement('tr');

    tr.innerHTML = `
      <td style="display:flex;align-items:center;gap:8px;">
  <img 
    src="${j.foto || 'https://ui-avatars.com/api/?name='+encodeURIComponent(j.nome)}"
    style="
      width:35px;
      height:35px;
      border-radius:50%;
      object-fit:cover;
      border:2px solid #22c55e;
    "
  >
  ${j.apelido || j.nome}
</td>
      <td>${j.apelido || '-'}</td>
      <td>${j.posicao || '-'}</td>
      <td>${j.tipo}</td>
      <td class="${classe}">${status}</td>
    `;

    tb.appendChild(tr);

    // ===== CARD (mobile)
    let card = document.createElement('div');
    card.className = 'card-jogador';

    card.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;">
  
  <img 
    src="${j.foto || 'https://ui-avatars.com/api/?name='+encodeURIComponent(j.nome)}"
    style="
      width:50px;
      height:50px;
      border-radius:50%;
      object-fit:cover;
      border:2px solid #22c55e;
      box-shadow:0 0 6px rgba(34,197,94,0.5);
    "
  >

  <h4>${j.apelido || j.nome}</h4>

</div>
      <div class="card-info">Jogador: ${j.nome}</div>
      <div class="card-info">Posição: ${j.posicao || '-'}</div>
      <div class="card-info">Tipo: ${j.tipo}</div>
      <div class="card-info">
    📅 Cadastro: ${formatarData(j.dataCadastro || j.datacadastro)}
  </div>
      <div class="card-status ${classe}">${status}</div>
    `;

    mobile.appendChild(card);

  });
}

 // ===== Renderizar Participação
function renderParticipacoesIndex(){

  const data = document.getElementById('dataIndex').value;
  const container = document.getElementById('listaIndex');

  if(!data){
    container.innerHTML = 'Selecione uma data';
    return;
  }

  const lista = registros.filter(r =>
    r.data && r.data.startsWith(data)
  );

  let totalGols = 0;
  let artilharia = {};

  if(lista.length === 0){
    container.innerHTML = 'Nenhuma participação';
    return;
  }

  container.innerHTML = '';
  
  // 🔥 LOOP PRINCIPAL
  lista.forEach(r => {

    totalGols += r.gols || 0;

    const jogador = jogadores.find(j =>
      String(j.id) === String(r.jogadorId || r.jogadorid)
    );

    const nome = jogador
      ? (jogador.apelido || jogador.nome)
      : '⚠️';

    if(!artilharia[nome]){
      artilharia[nome] = 0;
    }

    artilharia[nome] += r.gols || 0;

    let card = document.createElement('div');
    card.className = 'card-registro';

    card.innerHTML = `
      <h4>${nome}</h4>

      <div class="info">⚽ Gols: ${r.gols}</div>
      <div class="info">🟨 ${r.cartao_amarelo || 0} | 🟦 ${r.cartao_azul || 0} | 🟥 ${r.cartao_vermelho || 0}</div>
      <div class="info">Obs: ${r.obs || '-'}</div>
    `;

    container.appendChild(card);
  });

 // 🔥 CALCULAR ARTILHEIRO
let artilheiro = '-';
let maxGols = 0;
let jogadorTop = null;

Object.entries(artilharia).forEach(([nome, gols])=>{
  if(gols > maxGols){
    maxGols = gols;
    artilheiro = nome;

    jogadorTop = jogadores.find(j =>
      (j.apelido || j.nome) === nome
    );
  }
});

// 🔥 FOTO DO ARTILHEIRO
const foto = jogadorTop?.foto
  ? jogadorTop.foto
  : 'https://ui-avatars.com/api/?name=' + encodeURIComponent(artilheiro);

// 🔥 CARD RESUMO
let resumoTop = document.createElement('div');
resumoTop.className = 'card';

resumoTop.innerHTML = `
  <h3 style="text-align:center;">📊 Resumo do Dia</h3>

  <p style="text-align:center;">
    ⚽ Total de gols: <b>${totalGols}</b>
  </p>

  <div style="text-align:center;margin-top:15px;">

    <h4>🏆 Artilheiro do Dia</h4>

    <img 
      src="${foto}"
      style="
        width:100px;
        height:100px;
        border-radius:50%;
        object-fit:cover;
        border:3px solid gold;
        box-shadow:0 0 15px rgba(255,215,0,0.8);
        margin-top:10px;
      "
    >

    <p style="font-size:18px;margin:8px 0;">
      <b>${artilheiro}</b>
    </p>

    <p>⚽ ${maxGols} gols</p>

  </div>
`;

// 🔥 COLOCA NO TOPO
container.prepend(resumoTop);
 
}

// ===== RANKING =====
function renderRanking(){

  let dados = {};

  registros.forEach(r=>{

    const jogador = jogadores.find(j => 
      String(j.id) === String(r.jogadorId || r.jogadorid)
    );

    const nome = jogador 
  ? (jogador.apelido || jogador.nome) 
  : '---';

if(!dados[nome]){
  dados[nome] = {
    gols:0,
    presenca:0,
    amarelo:0,
    azul:0,
    vermelho:0
  };
}

dados[nome].gols += r.gols || 0;
dados[nome].presenca++;
dados[nome].amarelo += r.cartao_amarelo || 0;
dados[nome].azul += r.cartao_azul || 0;
dados[nome].vermelho += r.cartao_vermelho || 0;
  });

  montarRanking('rankingGols', dados, 'gols', true);
  montarRanking('rankingPresenca', dados, 'presenca', true);
  montarRanking('rankingAmarelo', dados, 'amarelo', true);
  montarRanking('rankingAzul', dados, 'azul', true);
  montarRanking('rankingVermelho', dados, 'vermelho', true);
}

function montarRanking(id, dados, campo, desc=true){

  const ul = document.getElementById(id);
  ul.innerHTML = '';

  Object.entries(dados)

    // 🔥 FILTRO: só quem tem cartão > 0
    .filter(([_, val]) => val[campo] > 0)

    // 🔥 ORDEM: maior → menor
    .sort((a,b)=> b[1][campo] - a[1][campo])

    .slice(0,5)
    .forEach(([nome,val])=>{

      let li = document.createElement('li');

      // 🎨 visual com emoji
      if(campo === 'vermelho'){
        li.textContent = `🟥 ${nome} - ${val[campo]}`;
      } else if(campo === 'amarelo'){
        li.textContent = `🟨 ${nome} - ${val[campo]}`;
      } else if(campo === 'azul'){
        li.textContent = `🟦 ${nome} - ${val[campo]}`;
      } else {
        li.textContent = `${nome} - ${val[campo]}`;
      }

      ul.appendChild(li);
    });
}

document.getElementById('dataIndex')
  .addEventListener('change', renderParticipacoesIndex);

// INIT
carregar();

const hoje = new Date().toISOString().slice(0,10);
document.getElementById('dataIndex').value = hoje;
renderParticipacoesIndex();

// 🔄 atualização automática leve
setInterval(carregar, 10000);

</script>

</body>
</html>
