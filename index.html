<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>⚽ Baba PRO</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:#fff;
  margin:0;
}

header{
  background:#020617;
  padding:15px;
  text-align:center;
}

.menu{
  text-align:center;
  margin:10px;
}

.btn{
  display:inline-block;
  background:#3b82f6;
  padding:8px 12px;
  margin:5px;
  border-radius:8px;
  text-decoration:none;
  color:#fff;
  font-weight:bold;
}

.container{
  padding:15px;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:8px;
  border-bottom:1px solid #334155;
  text-align:center;
}

.ok{ color:#22c55e; }
.devendo{ color:#ef4444; }
.avulso{ color:#38bdf8; }

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:10px;
}

@media(max-width:600px){
  .grid{
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<header>
  <h2>⚽ Baba PRO</h2>
</header>

<div class="menu">
  <a href="cadastro_jogador.html" class="btn">👤 Cadastro</a>
  <a href="mes.html" class="btn">💰 Mensalidades</a>
  <a href="baba.html" class="btn">📅 Baba do Dia</a>
</div>

<div class="container">

<!-- JOGADORES -->
<div class="card">
<h3>👥 Jogadores</h3>

<table>
<thead>
<tr>
<th>Nome</th>
<th>Apelido</th>
<th>Posição</th>
<th>Tipo</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tabelaJogadores"></tbody>
</table>

</div>

<!-- RANKINGS -->
<div class="grid">

<div class="card">
<h3>⚽ Artilharia</h3>
<ul id="rankingGols"></ul>
</div>

<div class="card">
<h3>👥 Participação</h3>
<ul id="rankingPresenca"></ul>
</div>

<div class="card">
<h3>💰 Pagamentos</h3>
<ul id="rankingPagamentos"></ul>
</div>

<div class="card">
<h3>🟨 Cartões</h3>
<ul id="rankingCartoes"></ul>
</div>

</div>

</div>

<script>
const API = 'https://baba-backend.onrender.com';

let jogadores = [];
let registros = [];
let mensalidades = {};

// ===== CARREGAR =====
async function carregar(){

  jogadores = await fetch(API+'/jogadores').then(r=>r.json());
  registros = await fetch(API+'/registros').then(r=>r.json());
  const mensal = await fetch(API+'/mensalidades').then(r=>r.json());

  mensalidades = {};

  mensal.forEach(m=>{
    if(!mensalidades[m.mes]) mensalidades[m.mes]=[];
    mensalidades[m.mes].push(m);
  });

  renderJogadores();
  renderRanking();
}

// ===== STATUS =====
function contarDevendo(j){

  if(j.tipo !== 'mensal') return 0;

  const hoje = new Date();
  const limite = 10;

  const dataCad = new Date(j.dataCadastro || j.datacadastro);

  let inicio = new Date(dataCad.getFullYear(), dataCad.getMonth(), 1);
  let fim = new Date(hoje.getFullYear(), hoje.getMonth(), 1);

  if(hoje.getDate() <= limite){
    fim.setMonth(fim.getMonth()-1);
  }

  let total = 0;

  while(inicio <= fim){

    const mes = inicio.toISOString().slice(0,7);

    const pagos = mensalidades[mes] || [];

    const pagou = pagos.some(p =>
      String(p.jogadorId || p.jogadorid) === String(j.id)
    );

    if(!pagou) total++;

    inicio.setMonth(inicio.getMonth()+1);
  }

  return total;
}

// ===== JOGADORES =====
function renderJogadores(){

  const tb = document.getElementById('tabelaJogadores');
  tb.innerHTML = '';

  jogadores.forEach(j=>{

    const dev = contarDevendo(j);

    let status = j.tipo === 'mensal'
      ? (dev > 0 ? `❌ ${dev} mês(es)` : '✅ Em dia')
      : '🎟️ Avulso';

    let tr = document.createElement('tr');

    tr.innerHTML = `
      <td>${j.nome}</td>
      <td>${j.apelido || '-'}</td>
      <td>${j.posicao || '-'}</td>
      <td>${j.tipo}</td>
      <td class="${dev>0?'devendo': j.tipo==='mensal'?'ok':'avulso'}">${status}</td>
    `;

    tb.appendChild(tr);
  });
}

// ===== RANKING =====
function renderRanking(){

  let dados = {};

  registros.forEach(r=>{

    const jogador = jogadores.find(j => 
      String(j.id) === String(r.jogadorId || r.jogadorid)
    );

    const nome = jogador ? jogador.nome : '---';

    if(!dados[nome]){
      dados[nome] = {
        gols:0,
        presenca:0,
        cartoes:0
      };
    }

    dados[nome].gols += r.gols;
    dados[nome].presenca++;
    dados[nome].cartoes += r.cartoes;
  });

  montarRanking('rankingGols', dados, 'gols', true);
  montarRanking('rankingPresenca', dados, 'presenca', true);
  montarRanking('rankingCartoes', dados, 'cartoes', false);
}

function montarRanking(id, dados, campo, desc=true){

  const ul = document.getElementById(id);
  ul.innerHTML = '';

  Object.entries(dados)
    .sort((a,b)=> desc ? b[1][campo]-a[1][campo] : a[1][campo]-b[1][campo])
    .slice(0,5)
    .forEach(([nome,val])=>{
      let li = document.createElement('li');
      li.textContent = `${nome} - ${val[campo]}`;
      ul.appendChild(li);
    });
}

// INIT
carregar();

// 🔄 atualização automática leve
setInterval(carregar, 10000);

</script>

</body>
</html>
