<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baba PRO - Dashboard</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:#fff;
  margin:0;
}

header{
  background:#020617;
  padding:15px;
  text-align:center;
}

.container{
  padding:15px;
  max-width:1200px;
  margin:auto;
}

/* CARDS */
.card{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
}

/* GRID RESPONSIVO */
.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(280px,1fr));
  gap:15px;
}

/* TABELAS */
.table-container{
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:600px;
}

th,td{
  padding:10px;
  border-bottom:1px solid #334155;
  text-align:left;
}

/* STATUS */
.ok{ color:#22c55e; }
.devendo{ color:#ef4444; }

/* INPUTS */
input,select,button{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:none;
  margin:5px 0;
  font-size:16px;
}

/* BOTÕES */
button{
  background:#22c55e;
  font-weight:bold;
  cursor:pointer;
}

/* MENU */
.menu{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:10px;
  padding:10px;
}

.btn-menu{
  flex:1;
  min-width:140px;
  text-align:center;
  padding:10px;
  background:#3b82f6;
  color:#fff;
  border-radius:8px;
  text-decoration:none;
  font-weight:bold;
}

/* 📱 MOBILE */
@media(max-width:768px){

  h1{
    font-size:20px;
  }

  th,td{
    font-size:14px;
  }

  .card{
    padding:12px;
  }

  .lista-card{
  background:#020617;
  padding:10px;
  border-radius:10px;
  margin-bottom:8px;
}

  button{
  font-size:16px;
  padding:14px;
}

}

</style>

</head>
<body>

<header>
  <h1>⚽ Baba PRO</h1>
</header>
<div class="menu">
<a href="cadastro_jogador.html" class="btn-menu">👤 Cadastro</a>
<a href="mes.html" class="btn-menu">💰 Mensalidades</a>
</div>
<div class="container">

<!-- JOGADORES -->
<div class="card">
<h2>👥 Jogadores</h2>

<div class="table-container">
<table>
<thead>
<tr>
<th>Nome</th>
<th>Apelido</th>
<th>Posição</th>
<th>Tipo</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tabelaJogadores"></tbody>
</table>
</div>
</div>

<!-- DATA -->
<div class="card">
<h2>📅 Data do Baba</h2>
<input type="date" id="data">
</div>

<!-- REGISTRO -->
<div class="grid">
<h2>➕ Registrar Participação</h2>

<select id="jogador"></select>
<input type="number" id="gols" placeholder="Gols">
<input type="number" id="cartoes" placeholder="Cartões">
<input id="obs" placeholder="Observação">

<button onclick="registrar()">Registrar</button>

</div>

<!-- LISTA PARTICIPAÇÕES -->
<div class="card">
<h2>📋 Participações</h2>
  
<div class="table-container">
<table>
<thead>
<tr>
<th>Jogador</th>
<th>Gols</th>
<th>Cartões</th>
<th>Obs</th>
</tr>
</thead>
<tbody id="listaRegistros"></tbody>
</table>

<p id="resumoBaba"></p>
</div> 
</div>



  
</div>

<script>
const API = 'https://baba-backend.onrender.com';

let jogadores = [];
let registros = [];
let mensalidades = {};

// ===== CARREGAR =====
let ultimoHash = '';

function gerarHash(dados){
  return JSON.stringify(dados).length;
}

async function carregar(){

  const jogadoresAPI = await fetch(API+'/jogadores').then(r=>r.json());
  const registrosAPI = await fetch(API+'/registros').then(r=>r.json());
  const mensalAPI = await fetch(API+'/mensalidades').then(r=>r.json());

  // 🔥 monta mensalidades
  let mensalTemp = {};
  mensalAPI.forEach(m=>{
    if(!mensalTemp[m.mes]) mensalTemp[m.mes] = [];
    mensalTemp[m.mes].push(m);
  });

  // 🔥 cria hash dos dados
  const novoHash = gerarHash({
    jogadoresAPI,
    registrosAPI,
    mensalAPI
  });

  // 🔥 só atualiza se mudou
  if(novoHash !== ultimoHash){

    console.log('🔄 Mudança detectada, atualizando...');

    ultimoHash = novoHash;

    jogadores = jogadoresAPI;
    registros = registrosAPI;
    mensalidades = mensalTemp;

    renderJogadores();
    renderSelect();
    renderRegistros();
    renderResumo(data);
  }else{
    console.log('😴 Sem mudança...');
  }
}

// ===== STATUS =====
function contarDevendo(j){

  if(j.tipo !== 'mensal') return 0;

  const hoje = new Date();
  const limite = 10;

  const dataCadStr = j.dataCadastro || j.datacadastro;

  if(!dataCadStr) return 0;

  const dataCad = new Date(dataCadStr.split('T')[0]);

  let inicio = new Date(dataCad.getFullYear(), dataCad.getMonth(), 1);
  let fim = new Date(hoje.getFullYear(), hoje.getMonth(), 1);

  if(hoje.getDate() <= limite){
    fim.setMonth(fim.getMonth()-1);
  }

  let total = 0;

  while(inicio <= fim){

    const mes = inicio.toISOString().slice(0,7);

    const pagos = mensalidades[mes] || [];

    const pagou = pagos.some(p =>
      String(p.jogadorId || p.jogadorid) === String(j.id)
    );

    if(!pagou) total++;

    inicio.setMonth(inicio.getMonth()+1);
  }

  return total;
}

// ===== RENDER JOGADORES =====
function renderJogadores(){

  const tb = document.getElementById('tabelaJogadores');
  tb.innerHTML = '';

  jogadores.forEach(j=>{

    const dev = contarDevendo(j);

    let status = j.tipo === 'mensal'
      ? (dev > 0 ? `❌ ${dev} mês(es)` : '✅ Em dia')
      : '🎟️ Avulso';

    let tr = document.createElement('tr');

    tr.innerHTML = `
      <td>${j.nome}</td>
      <td>${j.apelido || '-'}</td>
      <td>${j.posicao || '-'}</td>
      <td>${j.tipo}</td>
      <td class="${dev>0?'devendo':'ok'}">${status}</td>
    `;

    tb.appendChild(tr);
  });
}

// ===== SELECT =====
function renderSelect(){
  const sel = document.getElementById('jogador');
  sel.innerHTML = '';

  jogadores.forEach(j=>{
    let opt = document.createElement('option');
    opt.value = j.id;
    opt.textContent = j.nome;
    sel.appendChild(opt);
  });
}

// ===== DELETAR PARTICIPAÇÃO =====  
async function removerRegistro(id){

  if(!confirm("Remover participação?")) return;

  await fetch(API + '/registro/' + id, {
    method: 'DELETE'
  });

  carregar();
}

// ===== REGISTRAR =====
async function registrar(){

  const data = document.getElementById('data').value;
  const jogadorId = document.getElementById('jogador').value;

  if(!data) return alert("Selecione data");

  // 🚫 impedir duplicado
  const jaExiste = registros.some(r =>
    r.data === data &&
    String(r.jogadorId || r.jogadorid) === String(jogadorId)
  );

  if(jaExiste){
    alert("⚠️ Jogador já registrado nesse baba!");
    return;
  }

  await fetch(API+'/registro',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      data,
      jogadorId,
      gols: +document.getElementById('gols').value || 0,
      cartoes: +document.getElementById('cartoes').value || 0,
      obs: document.getElementById('obs').value
    })
  });

  carregar();
}
  

// ===== RENDER REGISTROS =====
function renderRegistros(){

  const data = document.getElementById('data').value;
  const tb = document.getElementById('listaRegistros');

  if(!data){
    tb.innerHTML = '<tr><td colspan="5">Selecione uma data</td></tr>';
    return;
  }

  const lista = registros.filter(r => r.data === data);

  tb.innerHTML = '';

  if(lista.length === 0){
    tb.innerHTML = '<tr><td colspan="5">Nenhum jogador registrado</td></tr>';
    return;
  }

  lista.forEach(r=>{

 const jogador = jogadores.find(j => 
  String(j.id) === String(r.jogadorId || r.jogadorid)
);

  let tr = document.createElement('tr');

  tb.innerHTML += `
  <div class="lista-card">
    <b>${jogador?.nome || '⚠️'}</b><br>
    ⚽ Gols: ${r.gols} |
    🟨 Cartões: ${r.cartoes}<br>
    📝 ${r.obs || ''}
  </div>
`;

  tb.appendChild(tr);
});

  renderResumo(data);
}

// atualizar lista ao trocar data
document.getElementById('data').addEventListener('change', renderRegistros);


function irCadastro(){
  window.location.href = 'cadastro_jogador.html';
}

function irMensalidades(){
  window.location.href = 'mes.html';
}

function renderResumo(data){

  const lista = registros.filter(r => r.data === data);

  const totalJogadores = lista.length;
  const totalGols = lista.reduce((s,r)=>s+r.gols,0);

  document.getElementById('resumoBaba').innerHTML = `
    👥 Jogadores: ${totalJogadores} |
    ⚽ Gols: ${totalGols}
  `;
 
}

  // INIT
carregar();

// 🔄 verificação inteligente (5s)
setInterval(() => {
  carregar();
}, 5000);
  
</script>

</body>
</html>
