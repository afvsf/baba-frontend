<style>
body{

}

header{

.btn{

  color:#94a3b8;

<body>

      regulamento

</div>

<button id="btnSalvar" class="btn" onclick="salvarJogador()">
Salvar

</div>
  
<!-- JOGADORES -->

<h3>👥 Jogadores</h3>

<table>

<tr>
<th>Jogador</th>

</tr>
</thead>

</table>

<div id="listaMobile"></div>

<!-- RANKINGS -->
<div class="grid">

<div class="card">
<h3>⚽ Artilharia</h3>
<ul id="rankingGols"></ul>
</div>

<h3>👥 Participação</h3>

<h3>🟥 Cartão Vermelho</h3>
<ul id="rankingVermelho"></ul>

</div>

  <h3>📋 Participações por Data</h3>

  <input type="date" id="dataIndex">

<div id="modalPDF" style="
display:none;
position:fixed;
top:0; left:0;
width:100%; height:100%;
background:rgba(0,0,0,0.9);
justify-content:center;
align-items:center;
">

<div style="
width:95%;
height:90%;
background:#1e293b;
border-radius:10px;
overflow:hidden;
position:relative;
">

<button onclick="fecharRegulamento()" style="
position:absolute;
top:10px;
right:10px;
background:#ef4444;
padding:8px;
border:none;
border-radius:6px;
z-index:10;
">❌</button>

<iframe src="regulamento.pdf" style="width:100%;height:80%;border:none;"></iframe>

<br><br>

<button onclick="aceitarRegulamento()" class="btn">
✅ Aceitar Regulamento
</button>

<script>
function abrirRegulamento(){
  document.getElementById('modalPDF').style.display = 'flex';
  carregarJogadoresAceite();
}

function fecharRegulamento(){
  document.getElementById('modalPDF').style.display = 'none';
}

async function carregarJogadoresAceite(){

  const res = await fetch(API+'/jogadores');
  const jogadores = await res.json();

  const select = document.getElementById('jogadorAceite');
  select.innerHTML = '<option value="">Selecione</option>';

  jogadores.forEach(j=>{
    select.innerHTML += `
      <option value="${j.id}">
        ${j.apelido || j.nome}
      </option>
    `;
  });
}

async function aceitarRegulamento(){

  const id = document.getElementById('jogadorAceite').value;

  if(!id){
    return alert("Selecione o jogador");
  }

  await fetch(API+'/aceitar-regulamento/'+id,{
    method:'PUT'
  });

  alert("Regulamento aceito com sucesso ✅");
  fecharRegulamento();
}
</script>  
  
  
<script>
const API = 'https://baba-backend-production.up.railway.app';

// 🔥 FUNÇÃO GLOBAL DE REQUISIÇÃO
function api(url, options = {}){

  const token = localStorage.getItem('token');

  return fetch(API + url, {
    ...options,
    headers: {
      'Content-Type':'application/json',
      ...(token && { 'Authorization': 'Bearer ' + token }),
      ...(options.headers || {})
    }
  });
}
let fotoFile = null;
let fotoPreview = '';
let jogadores = [];
let registros = [];
let mensalidades = {};

// ===== CARREGAR =====
async function carregar(){

  jogadores = await api('/jogadores').then(r=>r.json());
  registros = await api('/registros').then(r=>r.json());
  const mensal = await api('/mensalidades').then(r=>r.json());

if(!Array.isArray(mensal)){
  console.error('Erro mensalidades:', mensal);
  return;
}

  mensalidades = {};

  mensal.forEach(m=>{
    if(!mensalidades[m.mes]) mensalidades[m.mes]=[];
    mensalidades[m.mes].push(m);
  });

  renderJogadores();
  renderRanking();
}

function irAdmin(){

  const token = localStorage.getItem('token');

  if(token){
    window.location.href = 'admin.html';
  } else {
    window.location.href = 'login.html';
  }
}

// ===== FORMATA DATA =====
function formatarData(data){
  if(!data) return '-';
  return new Date(data).toLocaleDateString('pt-BR', { timeZone: 'UTC' });
}

// ===== STATUS =====
function contarDevendo(j){

  if(j.tipo !== 'mensal') return 0;

  const hoje = new Date();
  const limite = 10;

  const dataCadStr = j.dataCadastro || j.datacadastro;

  if(!dataCadStr) return 0;

  // 🔥 CORREÇÃO: evitar bug de timezone
  const [ano, mes] = dataCadStr.split('T')[0].split('-').map(Number);

  let inicio = new Date(ano, mes - 1, 1);
  let fim = new Date(hoje.getFullYear(), hoje.getMonth(), 1);

  // 🔥 REGRA DIA 10 (igual mes.html)
  if(hoje.getDate() <= limite){
    fim.setMonth(fim.getMonth() - 1);
  }

  let total = 0;

  while(inicio <= fim){

    const mesRef = inicio.toISOString().slice(0,7);

    const pagos = mensalidades[mesRef] || [];

    const pagou = pagos.some(p =>
      String(p.jogadorId || p.jogadorid) === String(j.id)
    );

    if(!pagou) total++;

    inicio.setMonth(inicio.getMonth() + 1);
  }

  return total;
}



function abrirCamera(){
  const input = document.getElementById('fotoInput');
  input.setAttribute('capture','environment'); // câmera traseira
  input.click();
}

function abrirGaleria(){
  const input = document.getElementById('fotoInput');
  input.removeAttribute('capture'); // abre galeria
  input.click();
}

async function uploadFoto(file){

  const formData = new FormData();
  formData.append('file', file);
  formData.append('upload_preset', 'baba_jogadores'); // seu preset

  const res = await fetch('https://api.cloudinary.com/v1_1/dldjnmlon/image/upload',{
    method: 'POST',
    body: formData
  });

  const data = await res.json();

  return data.secure_url;
}

async function salvarJogador(){

  const nome = document.getElementById('nome').value.trim();
  const apelido = document.getElementById('apelido').value.trim();
  const posicao = document.getElementById('posicao').value.trim();
  const telefone = document.getElementById('telefone').value;
  const tipo = document.getElementById('tipoJogador').value;
  const dataCadastro = document.getElementById('dataCadastro').value;
  const aceitou = document.getElementById('aceite').checked;

  const foto = document.getElementById('previewFoto').src || '';

  // 🔒 VALIDAÇÕES
  if(!nome){
    return alert("Digite o nome");
  }

  if(!posicao){
    return alert("Digite a posição");
  }

  if(!telefone || telefone.length < 14){
    return alert("Telefone inválido");
  }

  if(!aceitou){
    return alert("⚠️ Você precisa aceitar o regulamento");
  }

  // 🔥 EVITAR DUPLICADO
  const lista = await fetch(API+'/jogadores').then(r=>r.json());

  const existe = lista.some(j =>
    j.nome.toLowerCase() === nome.toLowerCase() ||
    (j.telefone && j.telefone === telefone)
  );

  if(existe){
    return alert("⚠️ Jogador já cadastrado");
  }

  const jogador = {
    id: Date.now().toString(),
    nome,
    apelido,
    posicao,
    telefone,
    tipo,
    dataCadastro: dataCadastro || new Date().toISOString(),
    foto,
    aceitou_regulamento: true
  };

  await fetch(API+'/jogadores',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(jogador)
  });

  alert("✅ Jogador cadastrado!");

  limparFormulario();
  carregar();
}

function limparFormulario(){
  document.getElementById('nome').value = '';
  document.getElementById('apelido').value = '';
  document.getElementById('posicao').value = '';
  document.getElementById('telefone').value = '';
  document.getElementById('dataCadastro').value = '';
  document.getElementById('aceite').checked = false;

  const img = document.getElementById('previewFoto');
  img.style.display = 'none';
  img.src = '';
}

// ===== JOGADORES =====
function renderJogadores(){

  const tb = document.getElementById('tabelaJogadores');
  const mobile = document.getElementById('listaMobile');

  tb.innerHTML = '';
  mobile.innerHTML = '';

  jogadores.forEach(j=>{

    const dev = contarDevendo(j);

    let status = '';
    let classe = '';

    if(j.tipo === 'mensal'){
      if(dev > 0){
        status = `❌ ${dev} mês(es)`;
        classe = 'devendo';
      }else{
        status = '✅ Em dia';
        classe = 'ok';
      }
    }else{
      status = '🎟️ Avulso';
      classe = 'avulso';
    }

    // ===== TABELA (desktop)
    let tr = document.createElement('tr');

    tr.innerHTML = `
      <td style="display:flex;align-items:center;gap:8px;">
  <img 
    src="${j.foto || 'https://ui-avatars.com/api/?name='+encodeURIComponent(j.nome)}"
    style="
      width:35px;
      height:35px;
      border-radius:50%;
      object-fit:cover;
      border:2px solid #22c55e;
    "
  >
  ${j.apelido || j.nome}
</td>
      <td>${j.apelido || '-'}</td>
      <td>${j.posicao || '-'}</td>
      <td>${j.tipo}</td>
      <td class="${classe}">${status}</td>
    `;

    tb.appendChild(tr);

    // ===== CARD (mobile)
    let card = document.createElement('div');
    card.className = 'card-jogador';

    card.innerHTML = `
      <div style="display:flex;align-items:center;gap:10px;">
  
  <img 
    src="${j.foto || 'https://ui-avatars.com/api/?name='+encodeURIComponent(j.nome)}"
    style="
      width:50px;
      height:50px;
      border-radius:50%;
      object-fit:cover;
      border:2px solid #22c55e;
      box-shadow:0 0 6px rgba(34,197,94,0.5);
    "
  >

  <h4>${j.apelido || j.nome}</h4>

</div>
      <div class="card-info">Jogador: ${j.nome}</div>
      <div class="card-info">Posição: ${j.posicao || '-'}</div>
      <div class="card-info">Tipo: ${j.tipo}</div>
      <div class="card-info">
    📅 Cadastro: ${formatarData(j.dataCadastro || j.datacadastro)}
  </div>
      <div class="card-status ${classe}">${status}</div>
    `;

    mobile.appendChild(card);

  });
}

 // ===== Renderizar Participação
function renderParticipacoesIndex(){

  const data = document.getElementById('dataIndex').value;
  const container = document.getElementById('listaIndex');

  if(!data){
    container.innerHTML = 'Selecione uma data';
    return;
  }

  const lista = registros.filter(r =>
    r.data && r.data.startsWith(data)
  );

  let totalGols = 0;
  let artilharia = {};

  if(lista.length === 0){
    container.innerHTML = 'Nenhuma participação';
    return;
  }

  container.innerHTML = '';
  
  // 🔥 LOOP PRINCIPAL
  lista.forEach(r => {

    totalGols += r.gols || 0;

    const jogador = jogadores.find(j =>
      String(j.id) === String(r.jogadorId || r.jogadorid)
    );

    const nome = jogador
      ? (jogador.apelido || jogador.nome)
      : '⚠️';

    if(!artilharia[nome]){
      artilharia[nome] = 0;
    }

    artilharia[nome] += r.gols || 0;

    let card = document.createElement('div');
    card.className = 'card-registro';

    card.innerHTML = `
      <h4>${nome}</h4>

      <div class="info">⚽ Gols: ${r.gols}</div>
      <div class="info">🟨 ${r.cartao_amarelo || 0} | 🟦 ${r.cartao_azul || 0} | 🟥 ${r.cartao_vermelho || 0}</div>
      <div class="info">Obs: ${r.obs || '-'}</div>
    `;

    container.appendChild(card);
  });

 // 🔥 CALCULAR ARTILHEIRO
let artilheiro = '-';
let maxGols = 0;
let jogadorTop = null;

Object.entries(artilharia).forEach(([nome, gols])=>{
  if(gols > maxGols){
    maxGols = gols;
    artilheiro = nome;

    jogadorTop = jogadores.find(j =>
      (j.apelido || j.nome) === nome
    );
  }
});

// 🔥 FOTO DO ARTILHEIRO
const foto = jogadorTop?.foto
  ? jogadorTop.foto
  : 'https://ui-avatars.com/api/?name=' + encodeURIComponent(artilheiro);

// 🔥 CARD RESUMO
let resumoTop = document.createElement('div');
resumoTop.className = 'card';

resumoTop.innerHTML = `
  <h3 style="text-align:center;">📊 Resumo do Dia</h3>

  <p style="text-align:center;">
    ⚽ Total de gols: <b>${totalGols}</b>
  </p>

  <div style="text-align:center;margin-top:15px;">

    <h4>🏆 Artilheiro do Dia</h4>

    <img 
      src="${foto}"
      style="
        width:100px;
        height:100px;
        border-radius:50%;
        object-fit:cover;
        border:3px solid gold;
        box-shadow:0 0 15px rgba(255,215,0,0.8);
        margin-top:10px;
      "
    >

    <p style="font-size:18px;margin:8px 0;">
      <b>${artilheiro}</b>
    </p>

    <p>⚽ ${maxGols} gols</p>

  </div>
`;

// 🔥 COLOCA NO TOPO
container.prepend(resumoTop);
 
}

// ===== RANKING =====
function renderRanking(){

  let dados = {};

  registros.forEach(r=>{

    const jogador = jogadores.find(j => 
      String(j.id) === String(r.jogadorId || r.jogadorid)
    );

    const nome = jogador 
  ? (jogador.apelido || jogador.nome) 
  : '---';

if(!dados[nome]){
  dados[nome] = {
    gols:0,
    presenca:0,
    amarelo:0,
    azul:0,
    vermelho:0
  };
}

dados[nome].gols += r.gols || 0;
dados[nome].presenca++;
dados[nome].amarelo += r.cartao_amarelo || 0;
dados[nome].azul += r.cartao_azul || 0;
dados[nome].vermelho += r.cartao_vermelho || 0;
  });

  montarRanking('rankingGols', dados, 'gols', true);
  montarRanking('rankingPresenca', dados, 'presenca', true);
  montarRanking('rankingAmarelo', dados, 'amarelo', true);
  montarRanking('rankingAzul', dados, 'azul', true);
  montarRanking('rankingVermelho', dados, 'vermelho', true);
}

function montarRanking(id, dados, campo, desc=true){

  const ul = document.getElementById(id);
  ul.innerHTML = '';

  Object.entries(dados)

    // 🔥 FILTRO: só quem tem cartão > 0
    .filter(([_, val]) => val[campo] > 0)

    // 🔥 ORDEM: maior → menor
    .sort((a,b)=> b[1][campo] - a[1][campo])

    .slice(0,5)
    .forEach(([nome,val])=>{

      let li = document.createElement('li');

      // 🎨 visual com emoji
      if(campo === 'vermelho'){
        li.textContent = `🟥 ${nome} - ${val[campo]}`;
      } else if(campo === 'amarelo'){
        li.textContent = `🟨 ${nome} - ${val[campo]}`;
      } else if(campo === 'azul'){
        li.textContent = `🟦 ${nome} - ${val[campo]}`;
      } else {
        li.textContent = `${nome} - ${val[campo]}`;
      }

      ul.appendChild(li);
    });
}

document.getElementById('dataIndex')
  .addEventListener('change', renderParticipacoesIndex);

// INIT
carregar();

const hoje = new Date().toISOString().slice(0,10);
document.getElementById('dataIndex').value = hoje;
renderParticipacoesIndex();

// 🔄 atualização automática leve
setInterval(carregar, 10000);

</script>
