  <input type="number" id="ano" value="2026">

<div class="dashboard">

  <div class="box">❌ Devendo<br><b id="devendo">0</b></div>
  <div class="box">👥 Jogadores<br><b id="jogadores">0</b></div>

<script>
const API = 'https://baba-backend-production.up.railway.app';

let jogadores = [];
let mensalidades = {};

// ===== MESES
function getMeses(ano){
  return Array.from({length:12},(_,i)=>{
    return `${ano}-${String(i+1).padStart(2,'0')}`;
  });
}

// ===== REGRA DIA 10
function podeCobrar(mes){
  const hoje = new Date();
  const [a,m] = mes.split('-');
  const dataMes = new Date(a, m-1, 1);

  if(hoje.getFullYear()==a && hoje.getMonth()==m-1){
    return hoje.getDate()>10;
  }

  return dataMes < new Date(hoje.getFullYear(), hoje.getMonth(), 1);
}

// ===== CARREGAR
async function carregar(){

  const ano = document.getElementById('ano').value;

  jogadores = await fetch(API+'/jogadores').then(r=>r.json());
  const mensal = await fetch(API+'/mensalidades').then(r=>r.json());

  mensalidades = {};

  mensal.forEach(m=>{
    if(!mensalidades[m.mes]) mensalidades[m.mes]=[];
    mensalidades[m.mes].push(m);
  });

  render(ano);
}

// ===== FORMATAR DATA
function formatarData(data){
  if(!data) return '';
  return new Date(data).toLocaleDateString('pt-BR',{timeZone:'UTC'});
}

// ===== RENDER
function render(ano){

  const meses = getMeses(ano);
  const container = document.getElementById('listaMensalMobile');

  let total = 0;
  let dev = 0;

  container.innerHTML = '';

  jogadores
  .filter(j => j.tipo === 'mensal')
  .forEach(j => {

    let card = document.createElement('div');
    card.className = 'card-jogador';

    let htmlMeses = '<div class="meses">';

    meses.forEach(mes => {

      const pag = (mensalidades[mes]||[])
        .find(p => String(p.jogadorId||p.jogadorid) === String(j.id));

      const dataCadStr = j.dataCadastro || j.datacadastro;

      if(!dataCadStr) return;

      const dCad = new Date(dataCadStr.split('T')[0]);
      const dMes = new Date(mes+'-01');

      let classe = '';
      let conteudo = mes.split('-')[1];

      if(dMes < dCad){
        classe = 'futuro';
        conteudo += '<br>-';
      }

      else if(pag){
        classe = 'ok';
        total += Number(pag.valor||20);

        conteudo += `<br>✅`;
      }

      else if(podeCobrar(mes)){
        classe = 'devendo';
        dev++;

        conteudo += `
          <br>❌
          <button onclick="pagar('${j.id}','${mes}')">Pagar</button>
        `;
      }

      else{
        classe = 'futuro';
        conteudo += '<br>⏳';
      }

      htmlMeses += `<div class="mes ${classe}">${conteudo}</div>`;
    });

    htmlMeses += '</div>';

    card.innerHTML = `
      <h3>${j.apelido || j.nome}</h3>
      ${htmlMeses}
    `;

    container.appendChild(card);
  });

  document.getElementById('total').innerText = 'R$ ' + total.toFixed(2);
  document.getElementById('devendo').innerText = dev;
  document.getElementById('jogadores').innerText = jogadores.length;
}

// ===== PAGAR
async function pagar(jogadorId, mes){

  let valor = prompt("Valor:", "20");
  if(valor===null) return;

  let data = prompt("Data:", new Date().toISOString().slice(0,10));

  await fetch(API+'/mensalidades',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ jogadorId, mes, valor, data })
  });

  carregar();
}

// INIT
carregar();
</script>
