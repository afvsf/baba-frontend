<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:#fff;
  padding:20px;
  margin:0;
}

h1{
  text-align:center;
}

/* ===== TOPO ===== */

  text-align:center;
  margin-bottom:20px;
}

input,button{
  padding:8px;
  border-radius:6px;
  border:none;
}

button{
  background:#22c55e;
  cursor:pointer;
  font-weight:bold;
  transition:0.2s;
}

button:hover{
  opacity:0.85;
}

/* ===== DASHBOARD ===== */
.dashboard{
  display:flex;
  gap:15px;
  justify-content:center;
  margin-bottom:20px;
}

.box{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  text-align:center;
  min-width:160px;
}

/* ===== TABELA (DESKTOP) ===== */
.tabela-scroll{
  width:100%;
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  background:#1e293b;
  min-width:900px;
}

th,td{
  padding:10px;
  border:1px solid #334155;
  text-align:center;
}

th{
  background:#020617;
}

.ok{ background:#14532d; }
.devendo{ background:#7f1d1d; }
.futuro{ background:#334155; }
.resumo{ background:#020617; font-size:12px; }

/* ===== MOBILE APP (CARDS) ===== */
#listaMensalMobile{
  display:none;
}

.card-jogador{
  background:#1e293b;
  padding:15px;
  border-radius:12px;
  margin-bottom:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

.card-jogador h3{
  margin-bottom:10px;
  font-size:16px;
}

.bloco{
  margin-bottom:10px;
  font-size:13px;
}

.linha{
  margin-top:4px;
}

.ok-text{ color:#22c55e; }
.devendo-text{ color:#ef4444; }

.vazio{
  color:#94a3b8;
  font-size:12px;
}

.total-dev{
  margin-top:10px;
  font-weight:bold;
  color:#f87171;
  font-size:14px;
}

/* ===== MOBILE ===== */

  body{
    padding:10px;
    font-size:13px;
  }

  h1{
    font-size:18px;
  }

  .dashboard{
    flex-direction:column;
    align-items:center;
  }

  .box{
    width:100%;
  }

  /* ESCONDE TABELA */
  .tabela-scroll{
    display:none;
  }

  /* MOSTRA CARDS */
  #listaMensalMobile{
    display:flex;
    flex-direction:column;
    gap:12px;
  }

  button{
    font-size:11px;
    padding:6px;
  }

</style>
</head>

<body>
  <div style="margin-bottom:15px;">
  <button onclick="window.location.href='index.html'">⬅ Voltar</button>
  <button onclick="logout()" style="background:#ef4444;">
🚪 Sair
</button>
</div>

<h1>💰 Mensalidades PRO</h1>

<div class="topo">
  Ano:
  <input type="number" id="ano" value="2026">
  <button onclick="carregar()">Atualizar</button>
</div>

<div class="dashboard">
  <div class="box">💰 Total<br><b id="total">R$ 0</b></div>
  <div class="box">❌ Devendo<br><b id="devendo">0</b></div>
  <div class="box">👥 Jogadores<br><b id="jogadores">0</b></div>
</div>

<div class="tabela-scroll">
  <!-- aqui ficaria a tabela desktop se quiser -->
</div>

<!-- MOBILE FORA DA TABELA -->
<div id="listaMensalMobile"></div>


<!-- 🔐 AUTH -->
<script src="auth.js"></script>
<script>
verificarAcesso();
</script>

  
<script>
const API = 'https://baba-backend-production.up.railway.app';

let jogadores = [];
let mensalidades = {};

// ===== MESES
function getMeses(ano){
  return Array.from({length:12},(_,i)=>{
    return `${ano}-${String(i+1).padStart(2,'0')}`;
  });
}

// ===== REGRA DIA 10
function podeCobrar(mes){
  const hoje = new Date();
  const [a,m] = mes.split('-');
  const dataMes = new Date(a, m-1, 1);

  if(hoje.getFullYear()==a && hoje.getMonth()==m-1){
    return hoje.getDate()>10;
  }

  return dataMes < new Date(hoje.getFullYear(), hoje.getMonth(), 1);
}

// ===== CARREGAR
async function carregar(){

  const ano = document.getElementById('ano').value;

  jogadores = await fetch(API+'/jogadores').then(r=>r.json());
  const mensal = await fetch(API+'/mensalidades').then(r=>r.json());

  mensalidades = {};

  mensal.forEach(m=>{
    if(!mensalidades[m.mes]) mensalidades[m.mes]=[];
    mensalidades[m.mes].push(m);
  });

  render(ano);
}

// ===== FORMATAR DATA
function formatarData(data){
  if(!data) return '';
  return new Date(data).toLocaleDateString('pt-BR',{timeZone:'UTC'});
}

// ===== RENDER
function render(ano){

  const meses = getMeses(ano);
  const container = document.getElementById('listaMensalMobile');

  let total = 0;
  let devTotal = 0;

  container.innerHTML = '';

  jogadores
  .filter(j => j.tipo === 'mensal')
  .forEach(j => {

    const dataCadStr = j.dataCadastro || j.datacadastro;
    if(!dataCadStr) return;

    const dCad = new Date(dataCadStr.split('T')[0]);

    let pagosHTML = '';
    let devendoMeses = [];
    let totalDevJogador = 0;

    meses.forEach(mes => {

      const dMes = new Date(mes+'-01');

      if(dMes < dCad) return;

      const pag = (mensalidades[mes]||[])
        .find(p => String(p.jogadorId||p.jogadorid) === String(j.id));

      if(pag){

        const valor = Number(pag.valor || 20);
        total += valor;

        pagosHTML += `
          <div class="linha ok-text">
            ${mes} - R$ ${valor}
            <small>(${formatarData(pag.data)})</small>
          </div>
        `;

      } else if(podeCobrar(mes)){

        devendoMeses.push(mes);
        totalDevJogador += 20;
        devTotal++;
      }

    });

    let card = document.createElement('div');
    card.className = 'card-jogador';

    card.innerHTML = `
      <h3>${j.apelido || j.nome}</h3>

      <div class="bloco">
        <b>💰 Pagos:</b>
        ${pagosHTML || '<div class="vazio">Nenhum pagamento</div>'}
      </div>

      <div class="bloco">
  <b>❌ Devendo:</b>
  ${
    devendoMeses.length 
      ? `<span class="devendo-text">${devendoMeses.join(', ')}</span>`
      : '<span class="ok-text">Nenhum 👍</span>'
  }
</div>

      <div class="total-dev">
        💸 Total Devendo: R$ ${totalDevJogador}
      </div>
    `;

    container.appendChild(card);
  });

  document.getElementById('total').innerText = 'R$ ' + total.toFixed(2);
  document.getElementById('devendo').innerText = devTotal;
  document.getElementById('jogadores').innerText = jogadores.length;
}

// ===== PAGAR
async function pagar(jogadorId, mes){

  let valor = prompt("Valor:", "20");
  if(valor===null) return;

  let data = prompt("Data:", new Date().toISOString().slice(0,10));

  await fetch(API+'/mensalidades',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ jogadorId, mes, valor, data })
  });

  carregar();
}

// INIT
carregar();
</script>

</body>
</html>
