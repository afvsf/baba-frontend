<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Mensalidades</title>

<style>
body { font-family: Arial; background:#f4f6f9; padding:20px; }
h1 { text-align:center; }

table {
  width:100%;
  border-collapse: collapse;
  background:#fff;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

th, td {
  padding:10px;
  border:1px solid #ddd;
  text-align:center;
}

th { background:#222; color:#fff; }

.ok { background:#d4edda; }
.devendo { background:#f8d7da; }

button {
  padding:5px 10px;
  border:none;
  background:#28a745;
  color:#fff;
  cursor:pointer;
}

button:hover { opacity:0.8; }

.topo {
  margin-bottom:20px;
  text-align:center;
}

  .dashboard{
  display:flex;
  gap:15px;
  margin-bottom:20px;
  justify-content:center;
}

.box{
  background:#fff;
  padding:15px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
  text-align:center;
  min-width:150px;
}

.ok{
  background:#d4edda;
  font-weight:bold;
}

.devendo{
  background:#f8d7da;
  font-weight:bold;
}

.futuro{
  background:#e2e8f0;
  color:#555;
}
</style>

</head>
<body>

<h1>💰 Controle de Mensalidades</h1>

<div class="topo">
  <label>Ano:</label>
  <input type="number" id="ano" value="2026">
  <button onclick="carregar()">Atualizar</button>
</div>
<div class="dashboard">
  <div class="box">
    💰 Total arrecadado<br>
    <b id="totalArrecadado">R$ 0</b>
  </div>

  <div class="box">
    ❌ Inadimplentes<br>
    <b id="totalDevendo">0</b>
  </div>

  <div class="box">
    👥 Jogadores<br>
    <b id="totalJogadores">0</b>
  </div>
</div>
  
<table>
  <thead id="thead"></thead>
  <tbody id="tbody"></tbody>
</table>

<script>
const API = 'https://baba-backend.onrender.com';

let jogadores = [];
let mensalidades = {};

// ===== GERAR MESES =====
function getMesesAno(ano){
  let meses = [];
  for(let i=0;i<12;i++){
    let m = (i+1).toString().padStart(2,'0');
    meses.push(`${ano}-${m}`);
  }
  return meses;
}

// ===== REGRA DIA 10 =====
function podeCobrarMes(mes){
  const hoje = new Date();
  const limite = 10;

  const [ano, mesNum] = mes.split('-');
  const dataMes = new Date(ano, mesNum-1, 1);

  // mês atual
  if(
    hoje.getFullYear() === dataMes.getFullYear() &&
    hoje.getMonth() === dataMes.getMonth()
  ){
    return hoje.getDate() > limite;
  }

  // meses anteriores
  return dataMes < new Date(hoje.getFullYear(), hoje.getMonth(), 1);
}

// ===== CARREGAR =====
async function carregar(){

  const ano = document.getElementById('ano').value;

  jogadores = await fetch(API + '/jogadores').then(r=>r.json());
  const mensal = await fetch(API + '/mensalidades').then(r=>r.json());

  mensalidades = {};

  mensal.forEach(m=>{
    if(!mensalidades[m.mes]){
      mensalidades[m.mes] = [];
    }
    mensalidades[m.mes].push(m);
  });

  render(ano);
}

  // ===== ATUALIZAR =====
function atualizarDashboard(){

  let total = 0;
  let devendo = 0;

  jogadores.forEach(j => {

    if(j.tipo !== 'mensal') return;

    const dataCadStr = j.dataCadastro || j.datacadastro;
    if(!dataCadStr) return;

    const hoje = new Date();

    const [anoCad, mesCad] = dataCadStr.split('T')[0].split('-').map(Number);
    let inicio = new Date(anoCad, mesCad - 1, 1);

    let fim = new Date(hoje.getFullYear(), hoje.getMonth(), 1);

    if(hoje.getDate() <= 10){
      fim.setMonth(fim.getMonth() - 1);
    }

    while(inicio <= fim){

      const mes = inicio.toISOString().slice(0,7);

      const pagos = mensalidades[mes] || [];
      const pagou = pagos.some(p => String(p.jogadorId) === String(j.id));

      if(pagou){
        const p = pagos.find(x => String(x.jogadorId) === String(j.id));
        total += Number(p.valor || 20);
      } else {
        devendo++;
      }

      inicio.setMonth(inicio.getMonth() + 1);
    }
  });

  document.getElementById('totalArrecadado').textContent = 'R$ ' + total.toFixed(2);
  document.getElementById('totalDevendo').textContent = devendo;
  document.getElementById('totalJogadores').textContent = jogadores.length;
}
  
// ===== RENDER =====
function render(ano){

  const meses = getMesesAno(ano);

  // HEADER
  let th = '<tr><th>Jogador</th>';
  meses.forEach(m=>{
    th += `<th>${m}</th>`;
  });
  th += '</tr>';
  document.getElementById('thead').innerHTML = th;

  // BODY
  let html = '';

  jogadores
    .filter(j => j.tipo === 'mensal')
    .forEach(j => {

      html += `<tr>`;
      html += `<td>${j.nome}</td>`;

      meses.forEach(mes => {

const pagos = mensalidades[mes] || [];
const pagamento = pagos.find(p => String(p.jogadorId) === String(j.id));

let classe = '';
let conteudo = '';

// 🔥 PEGAR DATA CORRETA DO BACKEND
const dataCadStr = j.dataCadastro || j.datacadastro;

if(!dataCadStr){
  html += `<td>-</td>`;
  return;
}

const [anoCad, mesCad] = dataCadStr.split('T')[0].split('-').map(Number);
const dataCadastro = new Date(anoCad, mesCad - 1, 1);

const [anoMes, mesMes] = mes.split('-').map(Number);
const dataMes = new Date(anoMes, mesMes - 1, 1);

// 🚫 ANTES DO CADASTRO
if(dataMes < dataCadastro){
  conteudo = '-';
}

// ✅ PAGOU
else if(pagamento){

  classe = 'ok';

  // 🔥 FORMATA DATA (remove horário)
 let dataFormatada = pagamento.data
    ? new Date(pagamento.data).toLocaleDateString('pt-BR')
    : '';

  // 🔥 VALOR PADRÃO
  let valorPago = pagamento.valor || 20;

conteudo = `
  <div style="font-size:14px">
    ✅<br>
    <b>R$ ${valorPago.toFixed(2)}</b><br>
    <small>${dataFormatada}</small>
  </div>
`;
}

// ❌ DEVENDO
else if(podeCobrarMes(mes)){
  classe = 'devendo';
  conteudo = `
    ❌
    <br>
    <button onclick="pagar('${j.id}','${mes}')">💰 Pagar</button>
  `;
}

else{
  classe = 'futuro';
  conteudo = '⏳';
}

html += `<td class="${classe}">${conteudo}</td>`;
      });

      html += `</tr>`;
    });

  document.getElementById('tbody').innerHTML = html;
}

// ===== PAGAMENTO =====
async function pagar(jogadorId, mes){

  let valor = prompt("Digite o valor da mensalidade:", "20");
  if(valor === null) return;

  valor = parseFloat(valor);

  let data = prompt("Data do pagamento (YYYY-MM-DD)", 
    new Date().toISOString().slice(0,10)
  );

  await fetch(API + '/mensalidades',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      jogadorId,
      mes,
      valor,
      data
    })
  });

  carregar();
  atualizarDashboard();
}

// INIT
carregar();

</script>

</body>
</html>
