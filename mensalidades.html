<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Mensalidades</title>

<style>
body { font-family: Arial; background:#f4f6f9; padding:20px; }
h1 { text-align:center; }

table {
  width:100%;
  border-collapse: collapse;
  background:#fff;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
}

th, td {
  padding:10px;
  border:1px solid #ddd;
  text-align:center;
}

th { background:#222; color:#fff; }

.ok { background:#d4edda; }
.devendo { background:#f8d7da; }

button {
  padding:5px 10px;
  border:none;
  background:#28a745;
  color:#fff;
  cursor:pointer;
}

button:hover { opacity:0.8; }

.topo {
  margin-bottom:20px;
  text-align:center;
}
</style>

</head>
<body>

<h1>💰 Controle de Mensalidades</h1>

<div class="topo">
  <label>Ano:</label>
  <input type="number" id="ano" value="2026">
  <button onclick="carregar()">Atualizar</button>
</div>

<table>
  <thead id="thead"></thead>
  <tbody id="tbody"></tbody>
</table>

<script>
const API = 'https://baba-backend.onrender.com';

let jogadores = [];
let mensalidades = {};

function getMesesAno(ano){
  let meses = [];
  for(let i=0;i<12;i++){
    let m = (i+1).toString().padStart(2,'0');
    meses.push(`${ano}-${m}`);
  }
  return meses;
}

// regra dia 10
function podeCobrarMes(mes){
  const hoje = new Date();
  const limite = 10;

  const [ano, mesNum] = mes.split('-');
  const dataMes = new Date(ano, mesNum-1, 1);

  if(
    hoje.getFullYear() === dataMes.getFullYear() &&
    hoje.getMonth() === dataMes.getMonth()
  ){
    return hoje.getDate() > limite;
  }

  return dataMes < new Date(hoje.getFullYear(), hoje.getMonth(), 1);
}

// carregar dados
async function carregar(){

  const ano = document.getElementById('ano').value;

  jogadores = await fetch(API + '/jogadores').then(r=>r.json());
  const mensal = await fetch(API + '/mensalidades').then(r=>r.json());

  mensalidades = {};

  mensal.forEach(m=>{
    if(!mensalidades[m.mes]){
      mensalidades[m.mes] = [];
    }
    mensalidades[m.mes].push(m);
  });

  render(ano);
}

// render tabela
function render(ano){

  const meses = getMesesAno(ano);

  // header
  let th = '<tr><th>Jogador</th>';
  meses.forEach(m=>{
    th += `<th>${m}</th>`;
  });
  th += '</tr>';

  document.getElementById('thead').innerHTML = th;

  // body
  let html = '';

  jogadores
    .filter(j => j.tipo === 'mensal')
    .forEach(j => {

      html += `<tr>`;
      html += `<td>${j.nome}</td>`;

      meses.forEach(mes => {

        const pagos = mensalidades[mes] || [];
        const pagamento = pagos.find(p => p.jogadorid === j.id);

        let classe = '';
        let conteudo = '';

        if(pagamento){
          classe = 'ok';
          conteudo = `✅<br>${pagamento.data || ''}`;
        } else {

          if(podeCobrarMes(mes)){
            classe = 'devendo';
            conteudo = `
              ❌
              <br>
              <button onclick="pagar('${j.id}','${mes}')">Pagar</button>
            `;
          } else {
            conteudo = '-';
          }
        }

        html += `<td class="${classe}">${conteudo}</td>`;
      });

      html += `</tr>`;
    });

  document.getElementById('tbody').innerHTML = html;
}

// pagar
async function pagar(jogadorId, mes){

  await fetch(API + '/mensalidades',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      jogadorId,
      mes
    })
  });

  carregar();
}

// init
carregar();

</script>

</body>
</html>
