<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>💰 Financeiro - Baba PRO</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:#fff;
  margin:0;
}

header{
  background:#020617;
  padding:15px;
  text-align:center;
  font-size:20px;
}

.container{
  padding:15px;
}

.card{
  background:#1e293b;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
}

.valor{
  font-size:20px;
  font-weight:bold;
}

.entrada{ color:#22c55e; }
.saida{ color:#ef4444; }
.saldo{ color:#38bdf8; }

input,select,button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:6px;
  border:none;
}

button{
  background:#22c55e;
  font-weight:bold;
  cursor:pointer;
}

.lista{
  margin-top:10px;
}

.item{
  background:#334155;
  padding:10px;
  border-radius:8px;
  margin-bottom:8px;
  display:flex;
  justify-content:space-between;
}

</style>
</head>

<body>
  <div style="margin-bottom:15px;">
  <button onclick="window.location.href='index.html'">⬅ Voltar</button>
  <button onclick="logout()" style="background:#ef4444;">
🚪 Sair
</button>
</div>

<header>💰 Financeiro do Baba</header>

<div class="container">

<div class="card">
  <h3>📅 Filtrar por Mês</h3>

  <input type="month" id="filtroMes">
</div>

<!-- RESUMO -->
<div class="card">
<h3>📊 Resumo do Mês</h3>

<div class="grid">
  <div>
    <div class="entrada">Entradas</div>
    <div id="totalEntradas" class="valor">R$ 0,00</div>
  </div>

  <div>
    <div class="saida">Despesas</div>
    <div id="totalDespesas" class="valor">R$ 0,00</div>
  </div>

  <div>
    <div class="saldo">Saldo</div>
    <div id="saldo" class="valor">R$ 0,00</div>
  </div>
</div>
</div>

<!-- NOVA DESPESA -->
<div class="card">
<h3>➖ Nova Despesa</h3>

<input type="date" id="dataGasto"> 
<input id="desc" placeholder="Descrição">
<input id="valor" type="number" placeholder="Valor">

<button id="btnSalvar" onclick="salvarDespesa()">Salvar</button>
</div>

<!-- LISTAS -->
<div class="card">
<h3>📋 Movimentações</h3>

<div id="listaFinanceiro" class="lista"></div>
</div>

</div>

<!-- 🔐 AUTH -->
<script src="auth.js"></script>
<script>
verificarAcesso();
</script>

<script>

const API = 'https://baba-backend-production.up.railway.app';

let jogadores = [];
let mensalidades = [];
let gastos = [];
let editandoId = null;

// ===== CARREGAR =====
async function carregar(){

  jogadores = await fetch(API+'/jogadores').then(r=>r.json());
  mensalidades = await fetch(API+'/mensalidades').then(r=>r.json());
  gastos = await fetch(API+'/gastos').then(r=>r.json());

  render();
}

function formatarData(data){
  if(!data) return '-';

  // 🔥 pega só a parte da data (YYYY-MM-DD)
  const [ano, mes, dia] = data.split('T')[0].split('-');

  return `${dia}/${mes}/${ano}`;
}

// ===== SALVAR DESPESA =====
async function salvarDespesa(){

  const dados = {
    data: document.getElementById('dataGasto').value || new Date().toISOString().slice(0,10),
    descricao: document.getElementById('desc').value,
    valor: Number(document.getElementById('valor').value)
  };

  if(!dados.descricao || !dados.valor){
    return alert("Preencha tudo");
  }

  if(editandoId){

    // ✏️ UPDATE
    await fetch(API+'/gastos/'+editandoId,{
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(dados)
    });

  } else {

    // ➕ INSERT
    await fetch(API+'/gastos',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(dados)
    });

  }

  limpar();
  editandoId = null;
  atualizarBotao();
  carregar();
}


function editarGasto(g){

  document.getElementById('desc').value = g.descricao;
  document.getElementById('valor').value = g.valor;
  document.getElementById('dataGasto').value = g.data?.slice(0,10);

  editandoId = g.id;

  atualizarBotao();
}

async function excluirGasto(id){

  if(!confirm("Excluir despesa?")) return;

  await fetch(API+'/gastos/'+id,{
    method:'DELETE'
  });

  carregar();
}

function limpar(){
  document.getElementById('desc').value = '';
  document.getElementById('valor').value = '';
  document.getElementById('dataGasto').value = '';
}

function atualizarBotao(){
  const btn = document.getElementById('btnSalvar');
  btn.textContent = editandoId ? 'Atualizar' : 'Salvar';
}

function getNomeJogador(id){

  // 🔥 PROTEÇÃO (evita erro antes de carregar dados)
  if(!jogadores || jogadores.length === 0){
    return '---';
  }

  const j = jogadores.find(x =>
    String(x.id) === String(id)
  );

  return j ? (j.apelido || j.nome) : '---';
}

function formatarMes(mes){
  if(!mes) return '-';

  const [ano, m] = mes.split('-');
  return `${m}/${ano}`;
}

// ===== RENDER =====
function render(){

    // 🔥 EVITA RENDER ANTES DE CARREGAR
  if(!jogadores || jogadores.length === 0){
    console.log("Carregando jogadores...");
    return;
  }

  const lista = document.getElementById('listaFinanceiro');
  const mesSelecionado = document.getElementById('filtroMes').value;

  lista.innerHTML = '';

  let entradas = 0;
  let despesas = 0;

  // 💰 ENTRADAS (mensalidades)
 mensalidades
  .filter(m => m.mes === mesSelecionado)
  .forEach(m=>{

      entradas += Number(m.valor) || 0;

    const nome = getNomeJogador(m.jogadorId || m.jogadorid);

    let div = document.createElement('div');
    div.className = 'item';

    div.innerHTML = `
  <div>
    💰 Mensalidade ${nome}
    <div style="font-size:12px;color:#94a3b8;">
      ${formatarMes(m.mes)} • 📅 ${formatarData(m.data)}
    </div>
  </div>

  <div class="entrada">
    + R$ ${Number(m.valor).toFixed(2)}
  </div>
`;

    lista.appendChild(div);
});

  // ➖ DESPESAS
  gastos
    .filter(g => g.data && g.data.startsWith(mesSelecionado))
    .forEach(g=>{

      despesas += Number(g.valor) || 0;

      let div = document.createElement('div');
      div.className = 'item';

      div.innerHTML = `
        <div>
        ➖ ${g.descricao} <br>
        <small style="color:#94a3b8;">
        📅 ${formatarData(g.data)}
        </small>
        </div>
        <div>
        <div class="saida">- R$ ${Number(g.valor).toFixed(2)}</div>

        <button onclick='editarGasto(${JSON.stringify(g)})'>✏️</button>
        <button onclick="excluirGasto(${g.id})">🗑️</button>
      </div>
      `;

      lista.appendChild(div);
    });

  // 📊 RESUMO
  const saldo = entradas - despesas;

  document.getElementById('totalEntradas').textContent =
    entradas.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});

  document.getElementById('totalDespesas').textContent =
    despesas.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});

  document.getElementById('saldo').textContent =
    saldo.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}


// INIT
carregar();


const hoje = new Date().toISOString().slice(0,7);
document.getElementById('filtroMes').value = hoje;

document.getElementById('filtroMes')
  .addEventListener('change', render);
  
</script>

</body>
</html>
